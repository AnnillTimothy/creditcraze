{% extends "base.html" %}
{% block title %}Page Not Found — CreditCraze{% endblock %}
{% block content %}
<div class="error-page">
  <div>
    <div class="error-code">404</div>
    <h2 class="error-title">Page Not Found</h2>
    <p class="error-desc" style="margin:0.75rem auto 2rem;">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a href="{{ url_for('home') }}" class="btn-glow">
        <i class="bi bi-house"></i> Go Home
      </a>
      <a href="{{ url_for('credibot') }}" class="btn-outline-glow">
        <i class="bi bi-stars"></i> Ask Credibot
      </a>
    </div>
  </div>
</div>
{% endblock %}
